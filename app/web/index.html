<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="VITA — Sistema Operativo Personal impulsado por IA.">

  <!-- No cachear el index: siempre carga la última versión -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="VITA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <meta name="theme-color" content="#6B7A4F">
  <title>VITA</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Auto-limpieza: borra versiones viejas (service worker + caches) y
    // recarga UNA vez. Así la app siempre muestra la última versión sin que
    // el usuario tenga que limpiar nada a mano.
    (function () {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        var teniaSW = regs.length > 0;
        var tareas = regs.map(function (r) { return r.unregister(); });
        if (window.caches && caches.keys) {
          tareas.push(caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (k) { return caches.delete(k); }));
          }));
        }
        Promise.all(tareas).then(function () {
          var huboCache = teniaSW;
          if (huboCache && !sessionStorage.getItem('vita_cache_limpiado')) {
            sessionStorage.setItem('vita_cache_limpiado', '1');
            location.reload();
          }
        });
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
